name: Integration 🔀

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Debug build env (temporary)
        if: github.event_name == 'pull_request'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          node <<'EOF'
          const { PrismaClient } = require('@prisma/client');
          const { PrismaPg } = require('@prisma/adapter-pg');
          const { Pool } = require('pg');

          function summarize(name, value) {
            const trimmed = value?.trim() ?? '';

            let parsed = {
              isValidUrl: false,
              protocol: null,
              hasHostname: false,
              hasPort: false,
              pathnameLength: 0,
              usernameLength: 0,
              passwordLength: 0
            };

            try {
              if (trimmed) {
                const url = new URL(trimmed);
                parsed = {
                  isValidUrl: true,
                  protocol: url.protocol,
                  hasHostname: Boolean(url.hostname),
                  hasPort: Boolean(url.port),
                  pathnameLength: url.pathname.length,
                  usernameLength: url.username.length,
                  passwordLength: url.password.length
                };
              }
            } catch {}

            console.log(
              JSON.stringify({
                name,
                present: Boolean(value),
                length: value?.length ?? 0,
                trimmedLength: trimmed.length,
                changedByTrim:
                  value !== undefined ? value.length !== trimmed.length : false,
                containsNewline: /\r|\n/.test(value ?? ''),
                parsed
              })
            );
          }

          async function validatePrismaClient(name, value) {
            const connectionString = value?.trim() ?? '';

            try {
              const pool = new Pool({ connectionString });
              const client = new PrismaClient({
                adapter: new PrismaPg(pool),
                log: ['query']
              });

              console.log(JSON.stringify({ name, prismaClientInit: 'ok' }));
              await client.$disconnect();
              await pool.end();
            } catch (error) {
              console.log(
                JSON.stringify({
                  name,
                  prismaClientInit: 'error',
                  errorName: error?.name ?? 'UnknownError',
                  errorMessage: String(error?.message ?? error).split('\n')[0]
                })
              );
            }
          }

          async function main() {
            for (const name of [
              'DATABASE_URL',
              'DIRECT_URL',
              'NEXT_PUBLIC_SUPABASE_URL',
              'NEXT_PUBLIC_SUPABASE_ANON_KEY',
              'SUPABASE_SERVICE_ROLE_KEY',
              'NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY'
            ]) {
              summarize(name, process.env[name]);
            }

            console.log(
              JSON.stringify({
                databaseEqualsDirect:
                  process.env.DATABASE_URL?.trim() ===
                  process.env.DIRECT_URL?.trim()
              })
            );

            await validatePrismaClient('DATABASE_URL', process.env.DATABASE_URL);
            await validatePrismaClient('DIRECT_URL', process.env.DIRECT_URL);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          EOF

      - name: Lint Code
        run: npm run lint

      - name: Verify Prisma schema/migration sync
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="$(git merge-base "${{ github.event.pull_request.base.sha }}" "${GITHUB_SHA}")"
          else
            BASE_REF="${{ github.event.before }}"
          fi

          # Handle the first push edge case where event.before can be all zeros.
          if [[ "${BASE_REF}" =~ ^0+$ ]]; then
            BASE_REF="HEAD~1"
          fi

          node scripts/verify-prisma-schema-sync.mjs "${BASE_REF}" "${GITHUB_SHA}"

      - name: Run Prisma Migration 🚀
        if: github.repository == 'pacemakerIT/pacemaker-video' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
        run: npx prisma migrate deploy

      - name: Build Project
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: npm run build

      - name: Run Tests
        run: npm run test
