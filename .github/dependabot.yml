version: 2
updates:
  # Maintain dependencies for npm packages
  - package-ecosystem: 'npm'
    pull-request-branch-name:
      separator: '-'
    directory: '/'
    open-pull-requests-limit: 20
    schedule:
      interval: 'weekly'
    groups:
      aws-sdk-s3:
        patterns:
          - '@aws-sdk/client-s3'
          - '@aws-sdk/s3-request-presigner'
        update-types:
          - 'minor'
          - 'patch'
      react-runtime:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
        update-types:
          - 'minor'
          - 'patch'
      next-framework:
        patterns:
          - 'next'
          - '@next/env'
          - 'eslint-config-next'
          - '@next/eslint-plugin-next'
        update-types:
          - 'minor'
          - 'patch'
      clerk-auth:
        patterns:
          - '@clerk/backend'
          - '@clerk/nextjs'
        update-types:
          - 'minor'
          - 'patch'
      prisma:
        patterns:
          - 'prisma'
          - '@prisma/client'
          - '@prisma/adapter-pg'
          - 'pg'
        update-types:
          - 'minor'
          - 'patch'
      pdf-viewer:
        patterns:
          - 'react-pdf'
          - 'pdfjs-dist'
        update-types:
          - 'minor'
          - 'patch'
      filepond:
        patterns:
          - 'react-filepond'
          - 'filepond'
          - 'filepond-plugin-image-preview'
        update-types:
          - 'minor'
          - 'patch'
      dnd-kit:
        patterns:
          - '@dnd-kit/core'
          - '@dnd-kit/sortable'
          - '@dnd-kit/utilities'
        update-types:
          - 'minor'
          - 'patch'
      form-validation:
        patterns:
          - 'react-hook-form'
          - '@hookform/resolvers'
          - 'zod'
        update-types:
          - 'minor'
          - 'patch'
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
          - 'eslint-plugin-storybook'
          - '@chromatic-com/storybook'
        update-types:
          - 'minor'
          - 'patch'
      vite-test-tooling:
        patterns:
          - 'vitest'
          - 'vite'
          - '@vitejs/plugin-react'
          - 'vite-tsconfig-paths'
          - 'happy-dom'
          - 'jsdom'
        update-types:
          - 'minor'
          - 'patch'
      tailwind-tooling:
        patterns:
          - 'tailwindcss'
          - 'tailwind-merge'
          - 'postcss'
          - 'autoprefixer'
        update-types:
          - 'minor'
          - 'patch'
      typescript-eslint:
        patterns:
          - '@typescript-eslint/eslint-plugin'
          - '@typescript-eslint/parser'
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: '@aws-sdk/client-s3'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@aws-sdk/s3-request-presigner'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react-dom'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@types/react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@types/react-dom'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'next'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@next/env'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'eslint-config-next'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@next/eslint-plugin-next'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@clerk/backend'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@clerk/nextjs'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'prisma'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@prisma/client'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@prisma/adapter-pg'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'pg'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react-pdf'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'pdfjs-dist'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react-filepond'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'filepond'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'filepond-plugin-image-preview'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@dnd-kit/core'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@dnd-kit/sortable'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@dnd-kit/utilities'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react-hook-form'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@hookform/resolvers'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'zod'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'storybook'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@storybook/*'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'eslint-plugin-storybook'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@chromatic-com/storybook'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'tailwindcss'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'typescript'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@typescript-eslint/eslint-plugin'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@typescript-eslint/parser'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'vitest'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'vite'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@vitejs/plugin-react'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'vite-tsconfig-paths'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'happy-dom'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'jsdom'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'react-day-picker'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'tailwind-merge'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'postcss'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'autoprefixer'
        update-types:
          - 'version-update:semver-major'

  # Maintain dependencies for GitHub Actions
  - package-ecosystem: 'github-actions'
    pull-request-branch-name:
      separator: '-'
    directory: '/.github/workflows'
    open-pull-requests-limit: 20
    schedule:
      interval: 'weekly'
